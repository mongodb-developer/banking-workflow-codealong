<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BankFlow{% endblock %}</title>
    <style>
        :root {
            --mdb-forest: #00684a;
            --mdb-leaf: #00ed64;
            --mdb-deep: #001e2b;
            --mdb-mint: #e3fcf7;
            --mdb-sage: #c1e7d9;
            --ink: #1f2933;
            --muted: #667085;
            --surface: #ffffff;
            --surface-soft: #f7faf9;
            --border: #d8e5df;
            --danger: #b42318;
            --warning: #9a6700;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--surface-soft); color: var(--ink); min-height: 100vh; }

        /* Nav */
        nav { background: var(--mdb-deep); padding: 0 2rem; display: flex; align-items: center; gap: 2rem; height: 56px; border-bottom: 3px solid var(--mdb-leaf); }
        nav a { color: #d9eee7; text-decoration: none; font-size: .9rem; font-weight: 500; padding: .3rem .6rem; border-radius: 4px; transition: background .15s, color .15s; }
        nav a:hover, nav a.active { background: rgba(0, 237, 100, .13); color: #fff; }
        .nav-brand { color: #fff; font-weight: 700; font-size: 1rem; margin-right: auto; letter-spacing: .3px; }

        /* Layout */
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }

        /* Cards */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 1px 3px rgba(0, 30, 43, .07); padding: 1.5rem; margin-bottom: 1.5rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; padding-bottom: .75rem; border-bottom: 1px solid var(--border); }
        .card-title { font-size: 1.15rem; font-weight: 600; color: var(--mdb-deep); }

        /* Buttons */
        .btn { display: inline-block; padding: .5rem 1.1rem; border-radius: 6px; font-size: .875rem; font-weight: 500; text-decoration: none; border: none; cursor: pointer; transition: background .15s, box-shadow .15s; }
        .btn:hover { box-shadow: 0 2px 6px rgba(0, 30, 43, .15); }
        .btn-primary { background: var(--mdb-forest); color: #fff; }
        .btn-primary:hover { background: #00533b; }
        .btn-success { background: var(--mdb-forest); color: #fff; }
        .btn-danger  { background: var(--danger); color: #fff; }
        .btn-sm { padding: .3rem .75rem; font-size: .8rem; }

        /* Badges */
        .badge { display: inline-block; padding: .2rem .55rem; border-radius: 9999px; font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
        .badge-pending    { background: #fff4cc; color: var(--warning); }
        .badge-processing { background: var(--mdb-mint); color: var(--mdb-forest); }
        .badge-approved   { background: #d7f7df; color: var(--mdb-forest); }
        .badge-rejected   { background: #fecdca; color: var(--danger); }
        .badge-completed  { background: #edf7f2; color: var(--mdb-deep); }

        /* Forms */
        .form-group { margin-bottom: 1.1rem; }
        label { display: block; font-size: .85rem; font-weight: 600; color: #344054; margin-bottom: .35rem; }
        input[type=text], input[type=number], textarea, select {
            width: 100%; padding: .55rem .8rem; border: 1px solid var(--border); border-radius: 6px; font-size: .9rem; background: #fff;
            transition: border-color .15s;
        }
        input:focus, textarea:focus, select:focus { outline: none; border-color: var(--mdb-forest); box-shadow: 0 0 0 2px rgba(0, 237, 100, .18); }
        .errorlist { color: var(--danger); font-size: .8rem; margin-top: .3rem; padding-left: 1.2rem; }

        /* Alerts */
        .alert { padding: .75rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: .9rem; }
        .alert-success { background: #d7f7df; color: var(--mdb-forest); border-left: 4px solid var(--mdb-leaf); }
        .alert-error    { background: #fecdca; color: var(--danger); border-left: 4px solid #f04438; }
        .alert-warning  { background: #fff4cc; color: var(--warning); border-left: 4px solid #f4b400; }
        .alert-info     { background: var(--mdb-mint); color: var(--mdb-forest); border-left: 4px solid var(--mdb-sage); }

        /* Tables */
        table { width: 100%; border-collapse: collapse; font-size: .875rem; }
        th { background: var(--surface-soft); text-align: left; padding: .65rem 1rem; font-weight: 600; color: #344054; border-bottom: 2px solid var(--border); }
        td { padding: .65rem 1rem; border-bottom: 1px solid #edf3f0; color: #2d3748; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--surface-soft); }

        a { color: var(--mdb-forest); }
        a:hover { color: #00533b; }
        .link-muted { color: var(--mdb-forest); font-size: .85rem; text-decoration: none; }
        .text-muted { color: var(--muted); }
        .soft-panel { background: var(--surface-soft); border-radius: 6px; padding: 1rem; }

        /* Score bar */
        .score-bar { height: 6px; border-radius: 3px; background: #edf3f0; margin-top: 4px; }
        .score-fill { height: 100%; border-radius: 3px; background: var(--mdb-leaf); }

        /* Empty state */
        .empty { text-align: center; padding: 3rem; color: var(--muted); }
        .empty p { margin-top: .5rem; font-size: .9rem; }
    </style>
</head>
<body>
<nav>
    <span class="nav-brand">BankFlow</span>
    <a href="{% url 'banking:document_list' %}">Documents</a>
    <a href="{% url 'banking:document_upload' %}">Upload</a>
    <a href="{% url 'banking:semantic_search' %}">Search</a>
    <a href="{% url 'banking:rag_query' %}">Retrieval</a>
    <a href="{% url 'banking:workflow_tasks' %}">Tasks</a>
</nav>
<div class="container">
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
